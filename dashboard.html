<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Running Coach Admin</title>
<style>
:root {
  --bg: #f5f5f5; --card: #fff; --text: #1a1a1a; --sub: #666;
  --border: #e0e0e0; --accent: #2563eb; --bar: #3b82f6;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --skeleton: #e5e5e5; --skeleton-shine: #f0f0f0;
  --tab-bg: #fff; --tab-border: #e0e0e0;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f; --card: #1a1a1a; --text: #e5e5e5; --sub: #999;
    --border: #333; --accent: #60a5fa; --bar: #3b82f6;
    --green: #4ade80; --yellow: #facc15; --red: #f87171;
    --skeleton: #2a2a2a; --skeleton-shine: #333;
    --tab-bg: #1a1a1a; --tab-border: #333;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 480px; margin: 0 auto; min-height: 100vh;
  padding-bottom: 60px;
}
.view { display: none; }
.view.active { display: block; }

/* Header */
.header {
  padding: 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 18px; flex: 1; }
.back-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: var(--text); padding: 4px 8px;
}
.logout-btn {
  padding: 4px 12px; background: none; border: 1px solid var(--border);
  border-radius: 6px; color: var(--sub); font-size: 12px; cursor: pointer;
}

/* Auth */
.auth-box { padding: 24px 16px; text-align: center; }
.auth-box h2 { font-size: 16px; margin-bottom: 16px; }
.auth-box input {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 16px; background: var(--card); color: var(--text);
  margin-bottom: 12px;
}
.auth-box button {
  width: 100%; padding: 12px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
}
.auth-error { color: var(--red); font-size: 14px; margin-top: 8px; }

/* Cards */
.card {
  background: var(--card); margin: 8px 12px; padding: 14px 16px;
  border-radius: 12px; border: 1px solid var(--border);
}
.card-title { font-size: 13px; color: var(--sub); margin-bottom: 10px; font-weight: 600; }

/* Bottom tabs */
.bottom-tabs {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; display: flex;
  background: var(--tab-bg); border-top: 1px solid var(--tab-border);
  z-index: 20;
}
.bottom-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 13px;
  color: var(--sub); background: none; border: none; cursor: pointer;
  font-weight: 500; transition: color 0.15s;
}
.bottom-tab.active { color: var(--accent); font-weight: 700; }
.bottom-tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

/* Funnel bar */
.funnel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.funnel-label { font-size: 13px; width: 44px; text-align: right; flex-shrink: 0; }
.funnel-bar-bg { flex: 1; height: 20px; background: var(--border); border-radius: 4px; overflow: hidden; }
.funnel-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.funnel-count { font-size: 13px; width: 30px; text-align: right; flex-shrink: 0; font-weight: 600; }

/* Command bar */
.cmd-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cmd-label { font-size: 13px; width: 64px; text-align: right; flex-shrink: 0; font-family: monospace; }
.cmd-bar-bg { flex: 1; height: 16px; background: var(--border); border-radius: 3px; overflow: hidden; }
.cmd-bar-fill { height: 100%; background: var(--bar); border-radius: 3px; transition: width 0.4s ease; }
.cmd-count { font-size: 12px; width: 28px; text-align: right; flex-shrink: 0; color: var(--sub); }

/* Daily trend chart */
.trend-chart { margin: 8px 0; }
.trend-bars { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
.trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.trend-bar { width: 100%; background: var(--bar); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s ease; }
.trend-label { font-size: 9px; color: var(--sub); margin-top: 3px; white-space: nowrap; }
.trend-value { font-size: 9px; color: var(--sub); margin-bottom: 2px; }
.trend-dau-row { display: flex; gap: 3px; margin-top: 6px; }
.trend-dau-col { flex: 1; text-align: center; }
.trend-dau-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.trend-dau-val { font-size: 9px; color: var(--accent); }

/* Stat hero */
.stat-hero { display: flex; gap: 12px; text-align: center; }
.stat-item { flex: 1; padding: 10px 4px; background: var(--bg); border-radius: 10px; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* Stale user */
.stale-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.stale-item:last-child { border-bottom: none; }
.stale-name { font-size: 14px; font-weight: 500; flex: 1; }
.stale-date { font-size: 12px; color: var(--sub); }
.step-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 500; white-space: nowrap;
}
.step-signed_up { background: #9ca3af33; color: #9ca3af; }
.step-connected { background: #3b82f633; color: #3b82f6; }
.step-surveyed { background: #eab30833; color: #eab308; }
.step-diagnosed { background: #f9731633; color: #f97316; }
.step-completed { background: #22c55e33; color: #22c55e; }

/* User list */
.user-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background 0.15s;
}
.user-item:active { background: var(--border); }
.user-icon { font-size: 28px; width: 40px; text-align: center; }
.user-info { flex: 1; }
.user-name { font-size: 15px; font-weight: 600; }
.user-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
.user-arrow { color: var(--sub); font-size: 18px; }
.user-count { padding: 12px 16px; font-size: 13px; color: var(--sub); }

/* Detail header */
.detail-header { padding: 16px; text-align: center; }
.detail-name { font-size: 20px; font-weight: 700; }
.detail-level { font-size: 14px; color: var(--sub); margin-top: 4px; }
.detail-streak { font-size: 13px; color: var(--accent); margin-top: 6px; }

/* XP bar */
.xp-bar-wrap { margin: 8px 0; }
.xp-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
.xp-label { font-size: 12px; color: var(--sub); margin-top: 4px; text-align: right; }

/* Sub-tabs */
.sub-tabs {
  display: flex; margin: 0 12px; background: var(--card);
  border-radius: 10px; border: 1px solid var(--border); overflow: hidden;
}
.sub-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 13px;
  background: none; border: none; cursor: pointer;
  color: var(--sub); font-weight: 500; transition: all 0.15s;
}
.sub-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
.sub-panel { display: none; }
.sub-panel.active { display: block; }

/* Plan & week */
.plan-title { font-size: 16px; font-weight: 600; }
.plan-detail { font-size: 13px; color: var(--sub); margin-top: 4px; }
.week-progress { margin: 8px 0; }
.progress-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); border-radius: 5px; transition: width 0.4s ease; }
.progress-label { font-size: 13px; margin-top: 4px; }
.week-stats { font-size: 13px; color: var(--sub); margin-top: 6px; }

/* Bar chart (weekly volume) */
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin: 8px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.bar { width: 100%; background: var(--bar); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s ease; }
.bar-label { font-size: 10px; color: var(--sub); margin-top: 4px; white-space: nowrap; }
.bar-value { font-size: 10px; color: var(--sub); margin-bottom: 2px; }

/* Fitness */
.fitness-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
.fitness-item { text-align: center; padding: 8px; background: var(--bg); border-radius: 8px; }
.fitness-value { font-size: 18px; font-weight: 700; }
.fitness-label { font-size: 11px; color: var(--sub); margin-top: 2px; }
.tsb-fresh { color: var(--green); }
.tsb-neutral { color: var(--yellow); }
.tsb-fatigued { color: var(--red); }

/* Recent runs */
.run-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.run-item:last-child { border-bottom: none; }
.run-top { display: flex; justify-content: space-between; align-items: center; }
.run-name { font-size: 14px; font-weight: 600; }
.run-date { font-size: 12px; color: var(--sub); }
.run-stats { font-size: 12px; color: var(--sub); margin-top: 4px; }

/* Conversations */
.conv-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.conv-item:last-child { border-bottom: none; }
.conv-time { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
.conv-q { font-size: 13px; margin-bottom: 4px; line-height: 1.4; }
.conv-q::before { content: 'Q: '; font-weight: 700; color: var(--accent); }
.conv-a { font-size: 13px; color: var(--sub); line-height: 1.4; }
.conv-a::before { content: 'A: '; font-weight: 700; }
.conv-more {
  background: none; border: none; color: var(--accent);
  font-size: 12px; cursor: pointer; padding: 0; margin-top: 2px;
}

/* Diagnostic */
.diag-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.diag-row:last-child { border-bottom: none; }
.diag-label { color: var(--sub); }
.diag-value { font-weight: 600; }

/* Timeline */
.timeline-item { display: flex; gap: 10px; padding: 6px 0; font-size: 12px; }
.timeline-time { color: var(--sub); width: 80px; flex-shrink: 0; }
.timeline-type {
  padding: 1px 6px; border-radius: 4px; font-size: 11px;
  background: var(--border); white-space: nowrap;
}

/* Empty state */
.empty { text-align: center; padding: 24px; color: var(--sub); font-size: 14px; }

/* Modal overlay */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  justify-content: center; align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  width: 100%; max-width: 480px; background: var(--card);
  border-radius: 16px 16px 0 0; padding: 20px 16px 24px;
  max-height: 80vh; overflow-y: auto;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(100%); } to { transform: translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 22px; color: var(--sub);
  cursor: pointer; padding: 4px 8px;
}
.modal-user { font-size: 13px; color: var(--sub); margin-bottom: 12px; }

/* Template chips */
.template-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.template-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 13px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; color: var(--text); transition: all 0.15s;
}
.template-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Preset Q chips */
.q-cat-label {
  font-size: 11px; font-weight: 600; color: var(--sub);
  margin: 6px 0 4px; display: block;
}
.q-cat-label:first-child { margin-top: 0; }
.q-chip {
  display: inline-block; padding: 4px 10px; border-radius: 14px; font-size: 12px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; color: var(--text); transition: all 0.15s;
  margin: 0 4px 4px 0; max-width: 100%; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.q-chip:hover { border-color: var(--accent); }
.q-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Message textarea & send */
.msg-textarea {
  width: 100%; min-height: 100px; padding: 12px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; resize: vertical;
  background: var(--bg); color: var(--text); font-family: inherit; line-height: 1.5;
}
.msg-char-count { font-size: 11px; color: var(--sub); text-align: right; margin-top: 4px; }
.send-btn {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 12px; transition: opacity 0.15s;
}
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500;
  z-index: 200; animation: fadeInOut 2.5s ease forwards;
  max-width: 400px; text-align: center;
}
.toast-success { background: var(--green); color: #fff; }
.toast-error { background: var(--red); color: #fff; }
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  75% { opacity: 1; }
  100% { opacity: 0; }
}

/* Stale send button */
.stale-send-btn {
  background: none; border: none; font-size: 18px; cursor: pointer;
  padding: 4px 6px; flex-shrink: 0;
}

/* Admin message item */
.admin-msg-item {
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.admin-msg-item:last-child { border-bottom: none; }
.admin-msg-date { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
.admin-msg-text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
.admin-msg-badge {
  display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 10px;
  background: var(--accent); color: #fff; margin-left: 6px;
}

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.sk-line { height: 14px; margin: 8px 0; }
.sk-bar { height: 80px; margin: 12px 0; }
.sk-card { height: 60px; margin: 8px 12px; border-radius: 12px; }
.sk-hero { height: 72px; margin: 8px 12px; border-radius: 12px; }
</style>
</head>
<body>

<!-- Auth View -->
<div id="authView" class="view">
  <div class="header"><h1>🏃 Running Coach Admin</h1></div>
  <div class="auth-box">
    <h2>관리자 인증</h2>
    <input type="password" id="adminKeyInput" placeholder="Admin Key 입력" autocomplete="off">
    <button onclick="submitAdminKey()">확인</button>
    <div id="authError" class="auth-error"></div>
  </div>
</div>

<!-- Metrics View -->
<div id="metricsView" class="view">
  <div class="header">
    <h1>🏃 Running Coach Admin</h1>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div id="metricsContent"></div>
  <div id="metricsLoading">
    <div class="skeleton sk-hero"></div>
    <div class="skeleton sk-card"></div>
    <div class="skeleton sk-card" style="height:100px"></div>
    <div class="skeleton sk-card"></div>
    <div class="skeleton sk-card"></div>
  </div>
</div>

<!-- Users View -->
<div id="usersView" class="view">
  <div class="header">
    <h1>🏃 Running Coach Admin</h1>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div id="userCount" class="user-count"></div>
  <div id="userList"></div>
  <div id="usersLoading">
    <div class="skeleton sk-card"></div>
    <div class="skeleton sk-card"></div>
    <div class="skeleton sk-card"></div>
  </div>
</div>

<!-- Detail View -->
<div id="detailView" class="view">
  <div class="header">
    <button class="back-btn" onclick="goBackFromDetail()">←</button>
    <h1 id="detailTitle">유저</h1>
  </div>
  <div id="detailContent"></div>
  <div id="detailLoading" style="padding:12px">
    <div class="skeleton sk-line" style="width:60%"></div>
    <div class="skeleton sk-line" style="width:40%"></div>
    <div class="skeleton sk-bar"></div>
    <div class="skeleton sk-line" style="width:80%"></div>
    <div class="skeleton sk-bar"></div>
  </div>
</div>

<!-- Message Modal -->
<div class="modal-overlay" id="msgModal" onclick="closeMsgModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">메시지 보내기</div>
      <button class="modal-close" onclick="closeMsgModal()">&times;</button>
    </div>
    <div class="modal-user" id="msgModalUser"></div>
    <div class="template-chips" id="templateChips"></div>
    <textarea class="msg-textarea" id="msgTextarea" placeholder="메시지를 입력하세요..." oninput="updateCharCount()"></textarea>
    <div class="msg-char-count"><span id="charCount">0</span> / 2000</div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">추천 질문 (Reply Keyboard)</span>
        <button style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer" onclick="addSuggestedQ()">+ 직접 입력</button>
      </div>
      <div id="presetQChips" style="margin-bottom:8px"></div>
      <div id="suggestedQList"></div>
      <div style="font-size:11px;color:var(--sub);margin-top:4px">유저가 버튼을 탭하면 해당 텍스트가 Q&A로 전송돼요. (최대 10개)</div>
    </div>
    <button class="send-btn" id="sendMsgBtn" onclick="sendAdminMessage()">발송</button>
  </div>
</div>

<!-- Bottom Tabs -->
<div id="bottomTabs" class="bottom-tabs" style="display:none">
  <button class="bottom-tab active" id="tabMetrics" onclick="switchTab('metrics')">
    <span class="bottom-tab-icon">📊</span>지표
  </button>
  <button class="bottom-tab" id="tabUsers" onclick="switchTab('users')">
    <span class="bottom-tab-icon">👥</span>유저
  </button>
</div>

<script>
const API_URL = 'https://dotsosqsftympgdescvz.supabase.co/functions/v1/rc-onboarding';
let adminKey = localStorage.getItem('rc_admin_key') || '';
let usersCache = [];
let metricsCache = null;
let currentTab = 'metrics';
let detailSubTab = 'activity';
let msgModalUserId = '';
let msgModalUserName = '';
let msgModalUserStep = '';
let selectedTemplateId = '';
let currentDashboardData = null;

const MSG_TEMPLATES = [
  { id: 'nudge_connect', step: 'signed_up', label: '연동 안내',
    text: '안녕하세요! \u{1F3C3}\nintervals.icu를 연동하면 개인 맞춤 코칭을 받을 수 있어요.\n봇 채팅에서 /start를 눌러 시작해보세요!' },
  { id: 'nudge_diagnose', step: 'connected', label: '진단 안내',
    text: '연동이 완료됐어요! \u{1F389}\n/diagnose 명령어로 현재 실력을 진단해보세요!' },
  { id: 'nudge_survey', step: 'diagnosed', label: '프로필 입력',
    text: '진단 완료! \u{1F52C}\n목표와 훈련 스타일을 입력하면 맞춤 계획을 만들어드려요.' },
  { id: 'nudge_plan', step: 'survey_saved', label: '계획 생성',
    text: '프로필 입력 완료! \u{1F4CB}\n/plan 명령어로 주간 훈련 계획을 생성해보세요!' },
  { id: 'custom', step: null, label: '직접 입력', text: '' },
];

// 추천 질문 프리셋 (Reply Keyboard용)
const Q_PRESETS = [
  { cat: '계획', items: [
    '지금 내 컨디션에 맞게 다음주 훈련 계획을 생성해 줘',
    '이번 주 계획에서 수요일을 쉬는 날로 바꿔줘',
    '이번 주 훈련 강도를 좀 낮춰줘',
  ]},
  { cat: '분석', items: [

/* ─── Utility ─── */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function fmtDateTime(s) {
  if (!s) return '';
  const d = new Date(s);
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

/* ─── Views ─── */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTabs(visible) {
  document.getElementById('bottomTabs').style.display = visible ? 'flex' : 'none';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabMetrics').classList.toggle('active', tab === 'metrics');
  document.getElementById('tabUsers').classList.toggle('active', tab === 'users');
  if (tab === 'metrics') {
    showView('metricsView');
    if (!metricsCache) loadMetrics();
  } else {
    showView('usersView');
    if (usersCache.length === 0) loadUsers();
  }
}

/* ─── Init ─── */
// URL params: ?user=<telegram_id>&tab=<activity|conversations|profile|diagnostic|messages>
const urlParams = new URLSearchParams(window.location.search);
const paramUser = urlParams.get('user');
const paramTab = urlParams.get('tab');

function updateUrl(params) {
  const u = new URLSearchParams(window.location.search);
  for (const [k, v] of Object.entries(params)) {
    if (v === null) u.delete(k);
    else u.set(k, v);
  }
  const qs = u.toString();
  history.replaceState(null, '', qs ? '?' + qs : window.location.pathname);
}

async function init() {
  if (adminKey) {
    showTabs(true);
    if (paramUser) {
      await initWithUserParam();
    } else {
      switchTab('metrics');
    }
  } else {
    showView('authView');
  }
}

async function initWithUserParam() {
  // 유저 목록 로드 후 telegram_user_id로 매칭
  try {
    const res = await apiCall('get_dashboard_users');
    if (res.success !== false && res.users) {
      usersCache = res.users;
      const target = usersCache.find(u => String(u.telegram_user_id) === paramUser);
      if (target) {
        await openUser(target.id, paramTab);
      } else {
        switchTab('metrics');
      }
    } else {
      switchTab('metrics');
    }
  } catch (e) {
    switchTab('metrics');
  }
}

/* ─── Auth ─── */
async function submitAdminKey() {
  const input = document.getElementById('adminKeyInput');
  const err = document.getElementById('authError');
  adminKey = input.value.trim();
  if (!adminKey) { err.textContent = 'Key를 입력해야 해요'; return; }
  err.textContent = '';
  try {
    // 유저 목록 + 서비스 지표 병렬 요청
    const [usersRes, metricsRes] = await Promise.all([
      apiCall('get_dashboard_users'),
      apiCall('get_service_metrics'),
    ]);
    if (usersRes.success !== false && usersRes.users) {
      localStorage.setItem('rc_admin_key', adminKey);
      usersCache = usersRes.users;
      if (metricsRes.metrics) metricsCache = metricsRes.metrics;
      showTabs(true);
      showView('metricsView');
      currentTab = 'metrics';
      document.getElementById('tabMetrics').classList.add('active');
      if (metricsCache) {
        renderMetrics(metricsCache);
        document.getElementById('metricsLoading').style.display = 'none';
      } else {
        loadMetrics();
      }
    } else {
      err.textContent = usersRes.error || '인증 실패';
      adminKey = '';
    }
  } catch (e) {
    err.textContent = '서버에 연결할 수 없어요';
    adminKey = '';
  }
}

function logout() {
  adminKey = '';
  metricsCache = null;
  usersCache = [];
  localStorage.removeItem('rc_admin_key');
  showTabs(false);
  showView('authView');
}

/* ─── API ─── */
async function apiCall(action, extra = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, admin_key: adminKey, ...extra }),
  });
  return res.json();
}

/* ─── Metrics ─── */
let selectedDate = ''; // empty = today

function changeDate(delta) {
  const picker = document.getElementById('datePicker');
  const current = picker ? picker.value : '';
  if (!current) return;
  const d = new Date(current + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const newDate = d.toISOString().split('T')[0];
  loadMetrics(newDate);
}

async function loadMetrics(date) {
  if (date !== undefined) selectedDate = date;
  showView('metricsView');
  document.getElementById('metricsContent').innerHTML = '';
  document.getElementById('metricsLoading').style.display = 'block';
  try {
    const extra = selectedDate ? { date: selectedDate } : {};
    const res = await apiCall('get_service_metrics', extra);
    if (res.error === '인증 실패') { logout(); return; }
    if (res.metrics) {
      metricsCache = res.metrics;
      renderMetrics(res.metrics);
    } else {
      document.getElementById('metricsContent').innerHTML = '<div class="empty">지표 로딩 실패</div>';
    }
  } catch (e) {
    document.getElementById('metricsContent').innerHTML = '<div class="empty">서버에 연결할 수 없어요</div>';
  }
  document.getElementById('metricsLoading').style.display = 'none';
}

function renderMetrics(m) {
  let html = '';
  const today = m.today || {};
  const dateStr = today.date ? today.date.slice(5).replace('-', '/') : '';

  // Date navigator
  html += `<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px">
    <button onclick="changeDate(-1)" style="background:none;border:none;font-size:20px;color:var(--text);cursor:pointer;padding:4px 8px">‹</button>
    <input type="date" id="datePicker" value="${today.date || ''}" onchange="loadMetrics(this.value)" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:14px">
    <button onclick="changeDate(1)" style="background:none;border:none;font-size:20px;color:var(--text);cursor:pointer;padding:4px 8px">›</button>
  </div>`;

  // Today stats hero
  html += `<div class="card">
    <div class="card-title">📊 ${esc(dateStr)} 현황</div>
    <div class="stat-hero">
      <div class="stat-item">
        <div class="stat-value">${today.events ?? 0}</div>
        <div class="stat-label">이벤트</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">${today.active_users ?? 0}</div>
        <div class="stat-label">활성</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">${today.new_users ?? 0}</div>
        <div class="stat-label">신규</div>
      </div>
    </div>
  </div>`;

  // Onboarding funnel (array from API)
  const funnelArr = m.funnel || [];
  const funnelColors = ['#9ca3af', '#3b82f6', '#f97316', '#a855f7', '#eab308', '#06b6d4', '#22c55e'];
  const funnelMax = funnelArr.length > 0 ? Math.max(...funnelArr.map(s => s.count ?? 0), 1) : 1;

  html += `<div class="card"><div class="card-title">📈 온보딩 퍼널</div>`;
  funnelArr.forEach((step, i) => {
    const pct = Math.round((step.count ?? 0) / funnelMax * 100);
    const color = funnelColors[i % funnelColors.length];
    html += `<div class="funnel-row">
      <div class="funnel-label" style="width:70px">${esc(step.label)}</div>
      <div class="funnel-bar-bg">
        <div class="funnel-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="funnel-count">${step.count ?? 0}</div>
    </div>`;
  });
  html += '</div>';

  // Daily trends (14 days)
  const trends = m.daily_trends || [];
  if (trends.length > 0) {
    const maxEvents = Math.max(...trends.map(t => t.events ?? 0), 1);
    html += `<div class="card"><div class="card-title">📊 일별 트렌드 (${trends.length}일)</div>`;
    html += '<div class="trend-chart"><div class="trend-bars">';
    for (const t of trends) {
      const h = Math.max(2, Math.round((t.events ?? 0) / maxEvents * 70));
      const label = (t.date || '').slice(5);
      html += `<div class="trend-col">
        <div class="trend-value">${(t.events ?? 0) > 0 ? t.events : ''}</div>
        <div class="trend-bar" style="height:${h}px"></div>
        <div class="trend-label">${label}</div>
      </div>`;
    }
    html += '</div>';
    // DAU line
    html += '<div class="trend-dau-row">';
    for (const t of trends) {
      const dau = t.dau ?? 0;
      html += `<div class="trend-dau-col">
        <div class="trend-dau-val">${dau > 0 ? dau : ''}</div>
      </div>`;
    }
    html += '</div></div></div>';
  }

  // Command usage
  const commands = m.command_usage || [];
  if (commands.length > 0) {
    const maxCmd = Math.max(...commands.map(c => c.count ?? 0), 1);
    html += `<div class="card"><div class="card-title">🔧 명령어 사용</div>`;
    for (const c of commands) {
      const pct = Math.round((c.count ?? 0) / maxCmd * 100);
      html += `<div class="cmd-row">
        <div class="cmd-label">${esc(c.command)}</div>
        <div class="cmd-bar-bg">
          <div class="cmd-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="cmd-count">${c.count ?? 0}</div>
      </div>`;
    }
    html += '</div>';
  }

  // Stale users
  const stale = m.stale_users || [];
  if (stale.length > 0) {
    html += `<div class="card"><div class="card-title">⚠️ 이탈 유저 (미완료) · ${stale.length}명</div>`;
    for (const u of stale) {
      const stepClass = 'step-' + (u.step || 'signed_up');
      const stepLabel = u.step || 'signed_up';
      const dateStr = fmtDate(u.last_active);
      html += `<div class="stale-item">
        <div class="stale-name">${esc(u.name || '알 수 없음')}</div>
        <span class="step-badge ${stepClass}">${esc(stepLabel)}</span>
        <div class="stale-date">${dateStr}</div>
        <button class="stale-send-btn" onclick="event.stopPropagation();openMsgModal('${esc(u.user_id)}','${esc(u.name || '알 수 없음')}','${esc(stepLabel)}')" title="메시지 보내기">\u{1F4E8}</button>
      </div>`;
    }
    html += '</div>';
  } else {
    html += `<div class="card"><div class="card-title">⚠️ 이탈 유저 (미완료)</div><div class="empty">없음</div></div>`;
  }

  html += '<div style="height:16px"></div>';
  document.getElementById('metricsContent').innerHTML = html;
}

/* ─── Users ─── */
async function loadUsers() {
  showView('usersView');
  document.getElementById('userList').innerHTML = '';
  document.getElementById('usersLoading').style.display = 'block';
  document.getElementById('userCount').textContent = '';
  try {
    const res = await apiCall('get_dashboard_users');
    if (res.error === '인증 실패') { logout(); return; }
    usersCache = res.users || [];
    renderUsers(usersCache);
  } catch (e) {
    document.getElementById('userList').innerHTML = '<div class="empty">로딩 실패</div>';
  }
  document.getElementById('usersLoading').style.display = 'none';
}

function renderUsers(users) {
  document.getElementById('usersLoading').style.display = 'none';
  const active = users.filter(u => u.onboarding_completed);
  document.getElementById('userCount').textContent =
    '📋 ' + active.length + '명 활성 / 총 ' + users.length + '명';

  if (users.length === 0) {
    document.getElementById('userList').innerHTML = '<div class="empty">등록된 유저 없음</div>';
    return;
  }

  const html = users.map(u => {
    const stepClass = u.onboarding_completed ? 'step-completed' : 'step-' + (u.onboarding_step || 'signed_up');
    const stepLabel = u.onboarding_completed ? 'completed' : (u.onboarding_step || 'signed_up');
    const lastDate = u.last_activity_at ? ' · 최근 ' + fmtDate(u.last_activity_at) : '';
    return `<div class="user-item" onclick="openUser('${esc(u.id)}')">
      <div class="user-icon">${u.level_icon || '🏃'}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.first_name)}  Lv.${u.level ?? 1}</div>
        <div class="user-meta">🔥${u.current_streak_weeks ?? 0}주${lastDate}</div>
        <div class="user-meta"><span class="step-badge ${stepClass}">${esc(stepLabel)}</span></div>
      </div>
      <div class="user-arrow">›</div>
    </div>`;
  }).join('');
  document.getElementById('userList').innerHTML = html;
}

/* ─── User Detail ─── */
async function openUser(userId, subTab) {
  showView('detailView');
  showTabs(false);
  const user = usersCache.find(u => u.id === userId);
  updateUrl({ user: user ? String(user.telegram_user_id) : userId, tab: subTab || null });
  document.getElementById('detailTitle').textContent = user ? user.first_name : '유저';
  document.getElementById('detailContent').innerHTML = '';
  document.getElementById('detailLoading').style.display = 'block';

  // 모달용 전역 변수 설정
  msgModalUserId = userId;
  msgModalUserName = user ? user.first_name : '유저';
  msgModalUserStep = user ? (user.onboarding_step || 'signed_up') : '';

  try {
    const res = await apiCall('get_dashboard', { user_id: userId });
    if (res.error) {
      document.getElementById('detailContent').innerHTML = '<div class="empty">' + esc(res.error) + '</div>';
      document.getElementById('detailLoading').style.display = 'none';
      return;
    }
    currentDashboardData = res.dashboard;
    renderDetail(res.dashboard);

    // URL param으로 서브탭 지정 시 자동 전환
    if (subTab) {
      const validTabs = ['activity', 'conversations', 'profile', 'diagnostic', 'messages'];
      if (validTabs.includes(subTab)) {
        const btn = document.querySelector(`.sub-tab[onclick*="'${subTab}'"]`);
        if (btn) switchSubTab(subTab, btn);
      }
    }
  } catch (e) {
    document.getElementById('detailContent').innerHTML = '<div class="empty">로딩 실패</div>';
  }
  document.getElementById('detailLoading').style.display = 'none';
}

function goBackFromDetail() {
  showTabs(true);
  switchTab(currentTab);
  updateUrl({ user: null, tab: null });
}

function renderDetail(d) {
  const u = d.user;
  const lvl = u.level || {};
  const streak = u.streak || {};
  const xpPct = lvl.next_level_xp > 0 ? Math.min(100, Math.round((lvl.current_xp || 0) / lvl.next_level_xp * 100)) : 100;

  let html = '';

  // User header
  html += `<div class="detail-header">
    <div class="detail-name">${esc(lvl.icon)} Lv.${lvl.level ?? 1} ${esc(lvl.title)}</div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
      <div class="xp-label">${lvl.current_xp ?? 0} / ${lvl.next_level_xp ?? 0} XP</div>
    </div>
    <div class="detail-streak">🔥 ${streak.current_weeks ?? 0}주 연속</div>
  </div>`;

  // Sub-tabs
  html += `<div class="sub-tabs">
    <button class="sub-tab active" onclick="switchSubTab('activity',this)">활동</button>
    <button class="sub-tab" onclick="switchSubTab('conversations',this)">대화</button>
    <button class="sub-tab" onclick="switchSubTab('profile',this)">프로필</button>
    <button class="sub-tab" onclick="switchSubTab('diagnostic',this)">진단</button>
    <button class="sub-tab" onclick="switchSubTab('messages',this)">메시지</button>
  </div>`;

  // Activity panel
  html += '<div id="panel-activity" class="sub-panel active">';
  html += renderActivityPanel(d);
  html += '</div>';

  // Conversations panel
  html += '<div id="panel-conversations" class="sub-panel">';
  html += renderConversationsPanel(d);
  html += '</div>';

  // Profile panel (runner profile + memories)
  html += '<div id="panel-profile" class="sub-panel">';
  html += renderProfilePanel(d);
  html += '</div>';

  // Diagnostic panel
  html += '<div id="panel-diagnostic" class="sub-panel">';
  html += renderDiagnosticPanel(d);
  html += '</div>';

  // Messages panel
  html += '<div id="panel-messages" class="sub-panel">';
  html += renderMessagesPanel(d);
  html += '</div>';

  html += '<div style="height:16px"></div>';
  document.getElementById('detailContent').innerHTML = html;
}

function switchSubTab(tab, btn) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  updateUrl({ tab: tab === 'activity' ? null : tab });
}

/* ─── Activity Panel ─── */
function renderActivityPanel(d) {
  let html = '';

  // Onboarding progress checklist
  html += renderOnboardingProgress(d);

  // Today plan
  if (d.today_plan) {
    const tp = d.today_plan;
    html += `<div class="card">
      <div class="card-title">📋 오늘 계획</div>
      <div class="plan-title">${esc(tp.title)}${tp.distance_km ? ' ' + tp.distance_km + 'km' : ''}</div>
      <div class="plan-detail">${[tp.target_pace ? '목표: ' + tp.target_pace : '', tp.target_hr_zone || '', tp.notes || ''].filter(Boolean).join(' · ')}</div>
    </div>`;
  } else {
    html += '<div class="card"><div class="card-title">📋 오늘 계획</div><div class="empty">오늘은 계획 없음 (휴식일)</div></div>';
  }

  // This week
  const tw = d.this_week || {};
  const twPct = tw.plan_total_km > 0 ? Math.min(100, Math.round((tw.distance_km || 0) / tw.plan_total_km * 100)) : 0;
  html += `<div class="card">
    <div class="card-title">📊 이번 주</div>
    <div class="week-progress">
      <div class="progress-bg"><div class="progress-fill" style="width:${twPct}%"></div></div>
      <div class="progress-label">${tw.distance_km ?? 0}${tw.plan_total_km > 0 ? ' / ' + tw.plan_total_km : ''} km</div>
    </div>
    <div class="week-stats">${tw.sessions ?? 0}회 · ${tw.time_min ?? 0}분 · ${tw.avg_pace || '-'}${tw.avg_hr ? ' · HR ' + tw.avg_hr : ''}</div>
  </div>`;

  // Weekly volumes (8 weeks)
  const vols = d.weekly_volumes || [];
  if (vols.length > 0) {
    const maxVol = Math.max(...vols.map(v => v.distance_km), 1);
    html += `<div class="card"><div class="card-title">📈 주간 볼륨 (8주)</div><div class="bar-chart">`;
    for (const v of vols) {
      const h = Math.max(2, Math.round(v.distance_km / maxVol * 70));
      html += `<div class="bar-col">
        <div class="bar-value">${v.distance_km > 0 ? v.distance_km : ''}</div>
        <div class="bar" style="height:${h}px"></div>
        <div class="bar-label">${esc(v.label)}</div>
      </div>`;
    }
    html += '</div></div>';
  }

  // Fitness
  if (d.fitness) {
    const f = d.fitness;
    const tsbClass = f.stage === 'fresh' ? 'tsb-fresh' : f.stage === 'fatigued' ? 'tsb-fatigued' : 'tsb-neutral';
    const tsbEmoji = f.stage === 'fresh' ? '🟢' : f.stage === 'fatigued' ? '🔴' : '🟡';
    html += `<div class="card">
      <div class="card-title">💪 피트니스</div>
      <div class="fitness-grid">
        <div class="fitness-item"><div class="fitness-value">${f.ctl}</div><div class="fitness-label">CTL</div></div>
        <div class="fitness-item"><div class="fitness-value">${f.atl}</div><div class="fitness-label">ATL</div></div>
        <div class="fitness-item"><div class="fitness-value ${tsbClass}">${tsbEmoji} ${f.tsb}</div><div class="fitness-label">TSB</div></div>
      </div>
    </div>`;
  }

  // Recent runs
  const runs = d.recent_runs || [];
  if (runs.length > 0) {
    html += '<div class="card"><div class="card-title">🏃 최근 러닝</div>';
    for (const r of runs) {
      html += `<div class="run-item">
        <div class="run-top">
          <div class="run-name">${esc(r.name)}</div>
          <div class="run-date">${(r.date || '').slice(5)}</div>
        </div>
        <div class="run-stats">${r.distance_km}km · ${r.duration_min}분 · ${r.avg_pace || '-'}${r.avg_hr ? ' · HR ' + r.avg_hr : ''}</div>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">🏃 최근 러닝</div><div class="empty">러닝 기록 없음</div></div>';
  }

  return html;
}

/* ─── Conversations Panel ─── */
function renderConversationsPanel(d) {
  const convs = d.conversations || [];
  if (convs.length === 0) {
    return '<div class="card"><div class="empty">대화 기록 없음</div></div>';
  }

  let html = '<div class="card">';
  convs.forEach(function(c, idx) {
    const answer = c.answer || '';
    const truncated = answer.length > 200;
    const shortAnswer = truncated ? answer.slice(0, 200) + '...' : answer;

    html += `<div class="conv-item">
      <div class="conv-time">${fmtDateTime(c.timestamp || c.created_at)}</div>
      <div class="conv-q">${esc(c.question)}</div>
      <div class="conv-a">
        <span id="conv-short-${idx}">${esc(shortAnswer)}</span>
        <span id="conv-full-${idx}" style="display:none">${esc(answer)}</span>
      </div>
      ${truncated ? `<button class="conv-more" id="conv-btn-${idx}" onclick="toggleConv(${idx})">더보기</button>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function toggleConv(idx) {
  const shortEl = document.getElementById('conv-short-' + idx);
  const fullEl = document.getElementById('conv-full-' + idx);
  const btn = document.getElementById('conv-btn-' + idx);
  if (fullEl.style.display === 'none') {
    shortEl.style.display = 'none';
    fullEl.style.display = 'inline';
    btn.textContent = '접기';
  } else {
    shortEl.style.display = 'inline';
    fullEl.style.display = 'none';
    btn.textContent = '더보기';
  }
}

/* ─── Onboarding Progress (reusable) ─── */
function renderOnboardingProgress(d) {
  const onbSteps = [
    { id: 'signed_up', label: '가입', event: 'user_signup' },
    { id: 'connected', label: 'intervals.icu 연동', event: 'intervals_connected' },
    { id: 'diagnosed', label: '러닝 진단', event: 'onboarding_diagnosed' },
    { id: 'coaching_started', label: '코칭 시작', event: 'method_auto_applied' },
    { id: 'goal_set', label: '목표 설정', event: 'onboarding_goal_set' },
    { id: 'days_selected', label: '요일 선택', event: 'onboarding_days_selected' },
    { id: 'plan_generated', label: '주간 계획 생성', event: 'plan_generated' },
    { id: 'completed', label: '온보딩 완료', event: 'onboarding_complete' },
  ];
  const stepOrder = onbSteps.map(s => s.id);
  const currentStep = d.user.onboarding_step || 'signed_up';
  const currentIdx = stepOrder.indexOf(currentStep);
  const timeline = d.timeline || [];

  const eventTimeMap = {};
  for (const ev of [...timeline].reverse()) {
    for (const step of onbSteps) {
      if ((ev.event || '').includes(step.event)) {
        eventTimeMap[step.id] = ev.date;
      }
    }
  }
  if (!eventTimeMap['signed_up'] && timeline.length > 0) {
    const signup = [...timeline].reverse().find(e => (e.event || '').includes('signup'));
    if (signup) eventTimeMap['signed_up'] = signup.date;
  }

  let html = '<div class="card"><div class="card-title">📋 온보딩 진행</div>';
  for (let i = 0; i < onbSteps.length; i++) {
    const step = onbSteps[i];
    const done = i <= currentIdx || !!eventTimeMap[step.id];
    const time = eventTimeMap[step.id] || '';
    const icon = done ? '✅' : (i === currentIdx + 1 ? '👉' : '⬜');
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;' + (i < onbSteps.length - 1 ? 'border-bottom:1px solid var(--border);' : '') + '">';
    html += '<span style="font-size:16px;width:24px;text-align:center">' + icon + '</span>';
    html += '<span style="flex:1;font-size:13px;' + (done ? 'color:var(--text)' : 'color:var(--sub)') + '">' + esc(step.label) + '</span>';
    if (time) html += '<span style="font-size:11px;color:var(--sub)">' + esc(time) + '</span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* ─── Profile Panel (Runner Profile + Memories) ─── */
function renderProfilePanel(d) {
  let html = '';

  // Runner Profile
  const profile = d.runner_profile;
  if (profile && profile.text) {
    const updatedAt = profile.updated_at ? fmtDateTime(profile.updated_at) : '';
    html += '<div class="card"><div class="card-title">🏃 러너 프로필' + (updatedAt ? ' <span style="font-weight:normal;font-size:12px;color:var(--sub)">' + updatedAt + '</span>' : '') + '</div>';
    // 프로필 텍스트를 섹션별로 파싱
    const sections = profile.text.split(/\n(?=\[)/);
    for (const section of sections) {
      const headerMatch = section.match(/^\[(.+?)\]\n?([\s\S]*)/);
      if (headerMatch) {
        html += '<div style="margin-bottom:12px">';
        html += '<div style="font-weight:600;font-size:13px;color:var(--accent);margin-bottom:4px">' + esc(headerMatch[1]) + '</div>';
        html += '<div style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap">' + esc(headerMatch[2].trim()) + '</div>';
        html += '</div>';
      } else if (section.trim()) {
        html += '<div style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin-bottom:12px">' + esc(section.trim()) + '</div>';
      }
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">🏃 러너 프로필</div><div class="empty">프로필 미생성</div></div>';
  }

  // Memories
  const memories = d.memories || [];
  if (memories.length > 0) {
    html += '<div class="card"><div class="card-title">🧠 메모리 (' + memories.length + ')</div>';
    for (const m of memories) {
      const importanceStars = '★'.repeat(Math.min(m.importance || 1, 5));
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--border)">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      html += '<span style="font-size:11px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:4px">' + esc(m.category || '-') + '</span>';
      html += '<span style="font-size:11px;color:var(--yellow)">' + importanceStars + '</span>';
      html += '</div>';
      html += '<div style="font-size:13px;line-height:1.5">' + esc(m.content) + '</div>';
      html += '<div style="font-size:11px;color:var(--sub);margin-top:2px">' + esc(m.source || '') + ' · ' + fmtDateTime(m.updated_at || m.created_at) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">🧠 메모리</div><div class="empty">저장된 메모리 없음</div></div>';
  }

  return html;
}

/* ─── Diagnostic Panel ─── */
function renderDiagnosticPanel(d) {
  let html = '';

  // Diagnostic profile
  const diag = d.diagnostic;
  if (diag) {
    html += '<div class="card"><div class="card-title">🔬 진단 프로필</div>';
    const diagRows = [
      ['진단일', fmtDate(diag.created_at || diag.diagnosed_at)],
      ['단계', diag.phase || '-'],
      ['CTL', diag.ctl ?? '-'],
      ['주간 볼륨', diag.weekly_volume_km ? diag.weekly_volume_km + 'km' : '-'],
      ['주간 횟수', diag.weekly_frequency ? diag.weekly_frequency + '회' : '-'],
      ['일관성', diag.consistency_weeks ? diag.consistency_weeks + '주' : '-'],
    ];
    for (const [label, value] of diagRows) {
      html += `<div class="diag-row">
        <div class="diag-label">${label}</div>
        <div class="diag-value">${esc(String(value))}</div>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">🔬 진단 프로필</div><div class="empty">진단 기록 없음</div></div>';
  }

  // Event timeline
  const timeline = d.timeline || [];
  if (timeline.length > 0) {
    html += '<div class="card"><div class="card-title">📜 이벤트 타임라인</div>';
    for (const ev of timeline) {
      html += `<div class="timeline-item">
        <div class="timeline-time">${fmtDateTime(ev.timestamp || ev.created_at)}</div>
        <span class="timeline-type">${esc(ev.event_type || ev.type)}</span>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">📜 이벤트 타임라인</div><div class="empty">이벤트 없음</div></div>';
  }

  return html;
}

/* ─── Message Modal ─── */
function openMsgModal(userId, userName, step) {
  msgModalUserId = userId;
  msgModalUserName = userName;
  msgModalUserStep = step;
  selectedTemplateId = '';
  suggestedQuestions = [];
  renderSuggestedQList();
  renderPresetChips();

  document.getElementById('msgModalUser').textContent = userName + (step ? ' \u00b7 ' + step : '');
  document.getElementById('msgTextarea').value = '';
  updateCharCount();

  // 템플릿 칩 렌더링
  const chipsEl = document.getElementById('templateChips');
  let chipsHtml = '';
  for (const t of MSG_TEMPLATES) {
    const autoMatch = t.step && t.step === step;
    chipsHtml += `<button class="template-chip${autoMatch ? ' selected' : ''}" data-tid="${t.id}" onclick="selectTemplate('${t.id}')">${esc(t.label)}</button>`;
    if (autoMatch) {
      selectedTemplateId = t.id;
    }
  }
  chipsEl.innerHTML = chipsHtml;

  // 자동 매칭 템플릿 텍스트 채우기
  if (selectedTemplateId) {
    const tmpl = MSG_TEMPLATES.find(t => t.id === selectedTemplateId);
    if (tmpl && tmpl.text) {
      document.getElementById('msgTextarea').value = tmpl.text;
      updateCharCount();
    }
  }

  document.getElementById('msgModal').classList.add('open');
}

function closeMsgModal(event) {
  if (event && event.target !== document.getElementById('msgModal')) return;
  document.getElementById('msgModal').classList.remove('open');
}

function selectTemplate(tid) {
  selectedTemplateId = tid;
  document.querySelectorAll('.template-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.tid === tid);
  });
  const tmpl = MSG_TEMPLATES.find(t => t.id === tid);
  if (tmpl) {
    document.getElementById('msgTextarea').value = tmpl.text;
    updateCharCount();
    if (tid === 'custom') document.getElementById('msgTextarea').focus();
  }
}

function updateCharCount() {
  const len = document.getElementById('msgTextarea').value.length;
  const el = document.getElementById('charCount');
  el.textContent = len;
  el.style.color = len > 2000 ? 'var(--red)' : 'var(--sub)';
  document.getElementById('sendMsgBtn').disabled = len === 0 || len > 2000;
}

/* ─── Suggested Questions ─── */
let suggestedQuestions = [];

function renderSuggestedQList() {
  const el = document.getElementById('suggestedQList');
  if (suggestedQuestions.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = suggestedQuestions.map((q, i) => `<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
    <input type="text" value="${esc(q)}" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);color:var(--text)" onchange="suggestedQuestions[${i}]=this.value;renderPresetChips()" placeholder="추천 질문 입력">
    <button style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px" onclick="removeSuggestedQ(${i})">&times;</button>
  </div>`).join('');
}

function addSuggestedQ(text) {
  if (suggestedQuestions.length >= 10) return;
  suggestedQuestions.push(text || '');
  renderSuggestedQList();
  renderPresetChips();
  if (!text) {
    const inputs = document.querySelectorAll('#suggestedQList input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }
}

function removeSuggestedQ(idx) {
  suggestedQuestions.splice(idx, 1);
  renderSuggestedQList();
  renderPresetChips();
}

function togglePresetQ(text) {
  const idx = suggestedQuestions.indexOf(text);
  if (idx >= 0) {
    suggestedQuestions.splice(idx, 1);
  } else {
    if (suggestedQuestions.length >= 10) return;
    suggestedQuestions.push(text);
  }
  renderSuggestedQList();
  renderPresetChips();
}

function renderPresetChips() {
  const el = document.getElementById('presetQChips');
  el.innerHTML = '';
  for (const cat of Q_PRESETS) {
    const label = document.createElement('span');
    label.className = 'q-cat-label';
    label.textContent = cat.cat;
    el.appendChild(label);
    for (const q of cat.items) {
      const btn = document.createElement('button');
      btn.className = 'q-chip' + (suggestedQuestions.includes(q) ? ' active' : '');
      btn.title = q;
      btn.textContent = q.length > 28 ? q.slice(0, 26) + '...' : q;
      btn.addEventListener('click', () => togglePresetQ(q));
      el.appendChild(btn);
    }
  }
}

async function sendAdminMessage() {
  const message = document.getElementById('msgTextarea').value.trim();
  if (!message) return;

  const btn = document.getElementById('sendMsgBtn');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  try {
    const validQuestions = suggestedQuestions.filter(q => q.trim());
    const res = await apiCall('send_admin_message', {
      user_id: msgModalUserId,
      message,
      template_id: selectedTemplateId || null,
      suggested_questions: validQuestions.length > 0 ? validQuestions : undefined,
    });

    if (res.success) {
      showToast('메시지를 발송했어요', 'success');
      document.getElementById('msgModal').classList.remove('open');
    } else {
      showToast(res.error || '발송 실패', 'error');
    }
  } catch (e) {
    showToast('서버에 연결할 수 없어요', 'error');
  }

  btn.disabled = false;
  btn.textContent = '발송';
}

function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2600);
}

/* ─── Messages Panel ─── */
function renderMessagesPanel(d) {
  const msgs = d.admin_messages || [];
  let html = '';

  // 발송 버튼
  const userName = d.user?.name || '유저';
  const step = '';
  html += `<div class="card" style="text-align:center">
    <button class="send-btn" onclick="openMsgModal('${esc(msgModalUserId)}','${esc(userName)}','${esc(msgModalUserStep)}')" style="margin:0">
      \u{1F4E8} 메시지 보내기
    </button>
  </div>`;

  // 발송 이력
  if (msgs.length > 0) {
    html += '<div class="card"><div class="card-title">\u{1F4EC} 발송 이력</div>';
    for (const m of msgs) {
      const badge = m.template_id && m.template_id !== 'custom'
        ? `<span class="admin-msg-badge">${esc(m.template_id)}</span>` : '';
      html += `<div class="admin-msg-item">
        <div class="admin-msg-date">${esc(m.date)}${badge}</div>
        <div class="admin-msg-text">${esc(m.message)}</div>
      </div>`;
    }
    html += '</div>';
  } else {
    html += '<div class="card"><div class="card-title">\u{1F4EC} 발송 이력</div><div class="empty">발송 이력 없음</div></div>';
  }

  return html;
}
